<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GTA 查询 - 初始配置</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font:16px/1.6 -apple-system,BlinkMacSystemFont,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:32px;max-width:520px;width:90%}
h1{font-size:1.4em;margin-bottom:8px}
p.sub{color:#8b949e;font-size:0.85em;margin-bottom:24px}
label{display:block;font-weight:600;margin-bottom:8px}
textarea{width:100%;height:200px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;padding:12px;font:13px monospace;resize:vertical}
ol{margin:16px 0;padding-left:20px;color:#8b949e;font-size:0.85em}
ol li{margin:4px 0}
ol a{color:#58a6ff}
.btn{display:block;width:100%;padding:12px;margin-top:16px;background:#238636;color:#fff;border:none;border-radius:6px;font-size:1em;cursor:pointer}
.btn:hover{background:#2ea043}
.btn:disabled{background:#30363d;cursor:not-allowed}
.msg{margin-top:12px;padding:10px;border-radius:6px;font-size:0.9em;display:none}
.msg.ok{display:block;background:#0d3320;border:1px solid #238636;color:#3fb950}
.msg.err{display:block;background:#330d0d;border:1px solid #da3633;color:#f85149}
.step{display:none}
.step.active{display:block}
</style>
</head>
<body>
<div class="card">

<div id="step1" class="step active">
<h1>初次配置</h1>
<p class="sub">只需粘贴一次 R星 Cookie，之后全自动续期</p>

<label>你的 R星 Cookie</label>
<textarea id="cookie" placeholder="粘贴完整 Cookie 字符串..."></textarea>

<ol>获取方式：
<li>浏览器打开 <a href="https://socialclub.rockstargames.com" target="_blank">R星 Social Club</a> 并登录</li>
<li><b>F5 刷新页面</b></li>
<li>F12 → Application → Cookies → <b>Ctrl+A 全选 → Ctrl+C 复制</b></li>
<li>粘贴到上方文本框</li>
</ol>

<button class="btn" onclick="submitCookie()">保存并启动</button>
<div id="msg1" class="msg"></div>
</div>

<div id="step2" class="step">
<h1>配置成功！</h1>
<div id="msg2" class="msg ok">Cookie 已注入，服务运行中。</div>
<p style="margin-top:16px">
<a href="/ui" style="color:#58a6ff;font-size:1.1em">前往查询面板 →</a>
</p>
<p style="margin-top:8px;color:#8b949e;font-size:0.85em">
健康检查: <a href="/health" style="color:#58a6ff">/health</a>
</p>
</div>

</div>
<script>
async function submitCookie(){
  var btn=document.querySelector('.btn');
  var msg=document.getElementById('msg1');
  var ck=document.getElementById('cookie').value.trim();
  if(!ck){msg.className='msg err';msg.textContent='请先粘贴 Cookie';return}
  btn.disabled=true;btn.textContent='保存中...';msg.className='msg';
  try{
    var r=await fetch('/api/setup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cookie:ck})});
    var d=await r.json();
    if(d.code===200){
      document.getElementById('step1').classList.remove('active');
      document.getElementById('step2').classList.add('active');
      var info=d.body||{};
      document.getElementById('msg2').innerHTML='Cookie 已注入！<br>字段: '+info.keys.length+' 个'+(info.missing_refresh_keys&&info.missing_refresh_keys.length?'<br>⚠ 缺少刷新字段: '+info.missing_refresh_keys.join(', '):'<br>自动续期: 就绪');
    }else{
      msg.className='msg err';msg.textContent='失败: '+d.message;
    }
  }catch(e){
    msg.className='msg err';msg.textContent='网络错误: '+e.message;
  }
  btn.disabled=false;btn.textContent='保存并启动';
}
document.getElementById('cookie').addEventListener('paste',function(){setTimeout(submitCookie,100)});
</script>
</body>
</html>
